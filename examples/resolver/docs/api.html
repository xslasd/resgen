        function init() {
            renderSidebar();
            renderDashboardStats();
            
            document.getElementById('api-search').addEventListener('input', (e) => {
                renderSidebar(e.target.value);
            });
        }

        function renderDashboardStats() {
            if (!apiData) return;
            const modules = apiData.modules.length;
            const endpoints = apiData.modules.reduce((acc, m) => acc + m.groups.reduce((g_acc, g) => g_acc + g.endpoints.length, 0), 0);
            const models = apiData.models ? apiData.models.length : 0;
            
            const mEl = document.getElementById('stat-modules');
            const eEl = document.getElementById('stat-endpoints');
            const mdEl = document.getElementById('stat-models');
            
            if (mEl) mEl.innerText = modules;
            if (eEl) eEl.innerText = endpoints;
            if (mdEl) mdEl.innerText = models;
        }

        let toggledModules = new Set(apiData.modules.map(m => m.name));
        let activeEndpointId = null;
        let currentView = 'apis'; // 'apis', 'validators'

        function renderSidebar(search = '') {
            const nav = document.getElementById('nav-content');
            nav.innerHTML = '';
            
            search = search.toLowerCase();

            // --- Primary Menu ---
            const menu = document.createElement('div');
            menu.className = 'space-y-1 mb-8';
            
            const createMenuItem = (id, label, icon, color, onClick) => {
                const isActive = currentView === id;
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-4 py-3 rounded-xl text-sm transition-all flex items-center gap-3 group font-bold tracking-tight ${isActive ? `bg-${color}-500/20 text-${color}-400 border border-${color}-500/30 ring-1 ring-${color}-500/20` : 'hover:bg-slate-800/50 text-slate-400'}`;
                btn.onclick = () => {
                    currentView = id;
                    onClick();
                    renderSidebar(search);
                };
                btn.innerHTML = `${icon} <span>${label}</span>`;
                return btn;
            };

            nav.appendChild(createMenuItem('validators', 'Validator Guide', 
                `<svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>`,
                'indigo', 
                showValidators
            ));

            nav.appendChild(createMenuItem('apis', 'API All',
                `<svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>`,
                'indigo',
                () => { if (!activeEndpointId || activeEndpointId === 'validators') activeEndpointId = null; }
            ));

            if (currentView !== 'apis') return;

            // --- API Modules ---
            const apiHeader = document.createElement('div');
            apiHeader.className = 'mt-8 mb-3 px-2 flex items-center justify-between border-t border-slate-800/30 pt-6';
            apiHeader.innerHTML = `
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">多配方功能</span>
                <div class="flex gap-3">
                   <button onclick="expandAll()" class="text-[9px] text-slate-500 hover:text-primary transition-colors">展开</button>
                   <button onclick="collapseAll()" class="text-[9px] text-slate-500 hover:text-primary transition-colors">折叠</button>
                </div>
            `;
            nav.appendChild(apiHeader);

            apiData.modules.forEach(mod => {
                const modFilter = mod.groups.some(group => 
                    group.endpoints.some(ep => ep.name.toLowerCase().includes(search) || ep.fullPath.toLowerCase().includes(search))
                );

                if (search && !modFilter) return;

                const modSection = document.createElement('div');
                modSection.className = 'mb-1';
                
                const isToggled = toggledModules.has(mod.name) || (search && modFilter);
                
                const header = document.createElement('button');
                header.className = 'w-full flex items-center justify-between px-3 py-2 text-[11px] font-bold text-slate-400/80 uppercase tracking-wider hover:text-white transition-colors group';
                header.onclick = () => toggleModule(mod.name);
                header.innerHTML = `
                    <div class="flex items-center gap-2">
                        <svg class="w-2.5 h-2.5 transition-transform ${isToggled ? 'rotate-90' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                        <span>${mod.name}</span>
                    </div>
                `;
                modSection.appendChild(header);

                if (isToggled) {
                    mod.groups.forEach(group => {
                        const groupDiv = document.createElement('div');
                        groupDiv.className = 'mt-0.5 ml-2 space-y-px border-l border-slate-800/40';
                        
                        group.endpoints.forEach(ep => {
                            if (search && !ep.name.toLowerCase().includes(search) && !ep.fullPath.toLowerCase().includes(search)) return;

                            const epId = `${mod.name}.${group.name}.${ep.name}`;
                            const isActive = activeEndpointId === epId;

                            const btn = document.createElement('button');
                            btn.className = `w-full text-left px-4 py-1.5 rounded-md text-[12px] transition-all flex items-center gap-3 group ${isActive ? 'bg-indigo-500/10 text-indigo-400' : 'text-slate-500 hover:text-slate-300'}`;
                            btn.onclick = () => {
                                activeEndpointId = epId;
                                showEndpoint(mod.name, group.name, ep);
                                renderSidebar(search);
                            };
                            
                            const methodStyle = `method-${ep.method.toLowerCase()}`;
                            btn.innerHTML = `
                                <span class="text-[8px] font-black w-9 py-0.5 rounded-[3px] text-center uppercase opacity-80 ${methodStyle}">${ep.method}</span>
                                <span class="truncate flex-1 transition-all group-hover:translate-x-0.5 font-medium">${ep.name}</span>
                            `;
                            groupDiv.appendChild(btn);
                        });
                        
                        if (groupDiv.children.length > 0) {
                            modSection.appendChild(groupDiv);
                        }
                    });
                }
                
                nav.appendChild(modSection);
            });
        }

        function toggleModule(name) {
            if (toggledModules.has(name)) toggledModules.delete(name);
            else toggledModules.add(name);
            renderSidebar(document.getElementById('api-search').value);
        }

        function expandAll() {
            apiData.modules.forEach(m => toggledModules.add(m.name));
            renderSidebar(document.getElementById('api-search').value);
        }

        function collapseAll() {
            toggledModules.clear();
            renderSidebar(document.getElementById('api-search').value);
        }

        function showValidators() {
            currentView = 'validators';
            const view = document.getElementById('content-view');
            let html = `
                <div class="space-y-8 animate-in">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl bg-indigo-500/20 flex items-center justify-center border border-indigo-500/20 shadow-lg shadow-indigo-500/10">
                            <svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                        </div>
                        <div>
                            <h1 class="text-4xl font-bold text-white tracking-tight">Validator Guide</h1>
                            <p class="text-slate-400 mt-1">Reference for all business constraints and validation rules defined in the API</p>
                        </div>
                    </div>

                    <div class="overflow-hidden rounded-2xl border border-slate-700/50 glass shadow-2xl">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-800/50 text-slate-400 font-bold uppercase text-[10px] tracking-widest">
                                <tr>
                                    <th class="p-4 w-1/3 text-indigo-400 border-b border-white/5">Validator Signature</th>
                                    <th class="p-4 w-2/3 border-b border-white/5">Description</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-white/5 cursor-default">
                                ${(apiData.validators || []).filter(v => v.name !== 'Required').map(v => `
                                    <tr class="hover:bg-white/[0.02] transition-colors">
                                        <td class="p-4 font-mono font-bold text-indigo-400">
                                            ${v.name}${v.args && v.args.length > 0 ? `(${v.args.map(a => `<span class="text-slate-500">${a.name}:</span> <span class="text-indigo-300/80">${a.type}</span>`).join(', ')})` : ''}
                                        </td>
                                        <td class="p-4 text-slate-300 leading-relaxed">${v.doc || '<span class="text-slate-600 italic">No description provided</span>'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            view.innerHTML = html;
        }

                        <span class="hover:text-primary transition-colors cursor-pointer">${groupName}</span>
                    </nav>
                    <div class="flex items-center gap-4">
                        <h1 class="text-4xl font-bold text-white tracking-tight">${ep.name}</h1>

                    ${ep.doc ? `<p class="text-slate-400 text-lg border-l-4 border-primary/50 pl-6 py-2 italic bg-slate-800/20 rounded-r-lg">${ep.doc.replace(/\n/g, '<br>')}</p>` : ''}

                        </div>
                        ` : ''}
                        ${ep.isArgsWrapped ? '<div class="text-indigo-400 border border-indigo-500/30 bg-indigo-500/5 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-tighter ml-auto shadow-inner">Wrapped Payload Mode</div>' : ''}
                    </div>
                </div>

                <section class="space-y-6">
                    <div class="flex items-center justify-between">
                        <h3 class="text-xl font-bold flex items-center gap-3 text-white">
                            <div class="w-8 h-8 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 4.5v15m7.5-7.5H3.5"/></svg>
                            </div>
                            Parameters
                        </h3>
                    </div>
                    <div class="overflow-hidden rounded-2xl border border-white/5 glass shadow-xl">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-800/80 text-slate-500 font-bold uppercase text-[10px] tracking-widest">
                                <tr>
                                    <th class="p-4">Source</th>
                                    <th class="p-4">Name</th>
                                    <th class="p-4">Type</th>
                                    <th class="p-4">Constraints</th>
                                    <th class="p-4">Description</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-white/5" id="params-body">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </section>

                <section class="space-y-6">
                    <h3 class="text-xl font-bold flex items-center gap-3 text-white">
                        <div class="w-8 h-8 rounded-lg bg-emerald-500/20 flex items-center justify-center text-emerald-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
                        </div>
                        Response
                    </h3>
                    <div class="glass rounded-2xl p-8 space-y-8 shadow-xl">
                        <div class="flex items-center justify-between">
                            <span class="px-3 py-1 rounded-full bg-emerald-500/10 text-emerald-400 text-xs font-black uppercase tracking-widest border border-emerald-500/20">${ep.successStatus || 200} Status</span>
                            <span class="text-[10px] text-slate-600 font-mono">${ep.responseContentType || 'application/json'}</span>
                        </div>
                         <div id="resp-section" class="hidden space-y-4">
                            <p class="text-xs text-slate-500 font-bold uppercase tracking-widest">Structure Fields</p>
                            <div id="resp-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                <div id="resp-success-container">
                                    <div class="overflow-hidden rounded-xl border border-white/5 bg-slate-900/30">
                                        <table class="w-full text-left text-xs">
                                            <tbody class="divide-y divide-white/5" id="resp-body"></tbody>
                                        </table>
                                    </div>
                                </div>
                                <div id="resp-error-container" class="hidden"></div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="space-y-6">
                    <h3 class="text-xl font-bold flex items-center gap-3 text-white">
                        <div class="w-8 h-8 rounded-lg bg-orange-500/20 flex items-center justify-center text-orange-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
                        </div>
                        Code Example
                    </h3>
                    <div class="glass rounded-2xl shadow-xl overflow-hidden border border-white/5">
                        <div class="flex border-b border-white/5 bg-slate-900/50">
                            <button onclick="switchTab('curl')" id="tab-curl" class="px-6 py-4 text-xs font-bold uppercase tracking-widest text-slate-500 hover:text-white transition-all tab-active">curl</button>
                            <button onclick="switchTab('js')" id="tab-js" class="px-6 py-4 text-xs font-bold uppercase tracking-widest text-slate-500 hover:text-white transition-all">Javascript</button>
                        </div>
                        <div class="p-6">
                            <div id="code-curl" class="code-block animate-in">
                                <pre class="text-slate-300 text-xs leading-relaxed overflow-x-auto custom-scrollbar p-2 whitespace-pre-wrap">${generateCurl(ep)}</pre>
                            </div>
                            <div id="code-js" class="code-block hidden animate-in">
                                <pre class="text-slate-300 text-xs leading-relaxed overflow-x-auto custom-scrollbar p-2 whitespace-pre-wrap">${generateJS(ep)}</pre>
                            </div>
                        </div>
                    </div>
                </section>
            `;

            view.innerHTML = html;
            renderParams(ep);
            renderResponse(ep);
        }

        function renderParams(ep) {
            const tbody = document.getElementById('params-body');
            if (!tbody) return;
            let rows = '';

            if (!ep.isArgsWrapped && ep.inputName) {
                const model = apiData.models.find(m => m.name === ep.inputName);
                if (model) {
                    const defaultSource = (ep.args && ep.args[0]) ? ep.args[0].source : 'Body';
                    model.fields.forEach(f => {
                        rows += renderRow({
                            name: f.name,
                            type: f.type,
                            source: defaultSource,
                            validators: f.validators,
                            doc: f.doc
                        }, 0);
                    });
                }
            } else if (ep.args) {
                ep.args.forEach(arg => {
                    rows += renderRow(arg, 0);
                });
            }

            tbody.innerHTML = rows || '<tr><td colspan="5" class="p-8 text-center text-slate-600 italic">No parameters required</td></tr>';
        }

        function parseType(typeStr) {
            if (!typeStr) return { base: '', args: [] };
            let clean = typeStr.replace(/[*\[\]<>!]/g, '');
            let match = typeStr.match(/([a-zA-Z0-9_]+)[<\[](.*)[>\]]/);
            if (match) {
                return {
                    base: match[1],
                    args: match[2].split(',').map(s => s.trim()),
                    full: typeStr
                };
            }
            return { base: clean, args: [], full: typeStr };
        }

        function renderResponse(ep) {
            const section = document.getElementById('resp-section');
            const successContainer = document.getElementById('resp-success-container');
            const errorContainer = document.getElementById('resp-error-container');
            const respGrid = document.getElementById('resp-grid');

            if (!section || !successContainer || !errorContainer || !respGrid) return;
            
            section.classList.remove('hidden');

            const typeStr = ep.returnTypeDSL || ep.returnType;
            const typeInfo = parseType(typeStr);
            
            // --- Success Section ---
            successContainer.innerHTML = `
                <div class="flex items-center gap-2 mb-2">
                    <span class="px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400 text-[10px] font-black uppercase border border-emerald-500/20">Success</span>
                    <span class="text-[10px] text-slate-500 font-mono italic">${ep.responseContentType || 'application/json'}</span>
                </div>
                <div class="overflow-hidden rounded-xl border border-white/5 bg-slate-900/30">
                    <table class="w-full text-left text-xs">
                        <tbody class="divide-y divide-white/5">
                            ${renderTypeStructure(typeInfo.base, typeInfo)}
                        </tbody>
                    </table>
                </div>
            `;

            // --- Error Section (Optional) ---
            if (ep.isErrorWrapped || (ep.errorContentType && ep.errorContentType !== ep.responseContentType)) {
                const errorMime = ep.errorContentType || ep.responseContentType || 'application/json';
                errorContainer.classList.remove('hidden');
                errorContainer.innerHTML = `
                    <div class="flex items-center gap-2 mb-2">
                        <span class="px-2 py-0.5 rounded bg-rose-500/10 text-rose-400 text-[10px] font-black uppercase border border-rose-500/20">Error Response</span>
                        <span class="text-[10px] text-slate-500 font-mono italic">${errorMime}</span>
                    </div>
                    <div class="overflow-hidden rounded-xl border border-rose-500/10 bg-slate-900/30">
                        <table class="w-full text-left text-xs">
                            <tbody class="divide-y divide-white/5">
                                ${ep.isErrorWrapped ? renderTypeStructure(ep.errorTypeBase, null) : 
                                    `<tr><td class="p-4 text-slate-500 italic">No specific structure, status code indicates error</td></tr>`
                                }
                            </tbody>
                        </table>
                    </div>
                `;
                respGrid.classList.add('lg:grid-cols-2');
            } else {
                errorContainer.classList.add('hidden');
                respGrid.classList.remove('lg:grid-cols-2');
            }
        }

        function renderTypeStructure(baseType, typeInfo) {
            const model = apiData.models.find(m => m.name === baseType);
            if (model) {
                let rows = '';
                model.fields.forEach(f => {
                    let displayType = f.type;
                    if (typeInfo && model.typeParams && model.typeParams.length > 0) {
                        model.typeParams.forEach((param, idx) => {
                            const cleanFieldType = f.type.replace(/[*\[\]]/g, '');
                            if (cleanFieldType === param && typeInfo.args[idx]) {
                                displayType = f.type.replace(param, typeInfo.args[idx]);
                            }
                        });
                    }

                    rows += renderRow({
                        name: f.name,
                        type: displayType,
                        doc: f.doc
                    }, 0, true);
                });
                return rows;
            } else {
                return renderRow({
                    name: '-',
                    type: baseType || 'Any',
                    doc: 'Direct return'
                }, 0, true);
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.code-block').forEach(b => b.classList.add('hidden'));
            document.getElementById(`code-${tab}`).classList.remove('hidden');
            
            document.getElementById('tab-curl').classList.remove('tab-active');
            document.getElementById('tab-js').classList.remove('tab-active');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
        }
        function getQueryParams(ep) {
            const params = [];
            if (!ep.isArgsWrapped && ep.inputName) {
                const model = apiData.models.find(m => m.name === ep.inputName);
                if (model) {
                    const source = (ep.args && ep.args[0]) ? ep.args[0].source : 'Body';
                    if (source === 'Query') {
                        model.fields.forEach(f => params.push(`${f.jsonName || f.name}=...`));
                    }
                }
            } else if (ep.args) {
                ep.args.forEach(arg => {
                    if (arg.source === 'Query') params.push(`${arg.name}=...`);
                });
            }
            return params.length > 0 ? '?' + params.join('&') : '';
        }

        function generateCurl(ep) {
            const baseUrl = apiData.info.baseUrl || 'http://localhost:8080';
            const url = `${baseUrl}${ep.fullPath}${getQueryParams(ep)}`;
            let curl = `curl -X ${ep.method} "${url}"`;
            if (ep.method !== 'GET') {
                curl += ` \\\n  -H "Content-Type: ${ep.contentType}"`;
                if (ep.args && ep.args.some(a => a.source === 'Body')) {
                    curl += ` \\\n  -d '{ ... }'`;
                }
            }
            return curl;
        }

        function generateJS(ep) {
            const baseUrl = apiData.info.baseUrl || 'http://localhost:8080';
            const url = `${baseUrl}${ep.fullPath}${getQueryParams(ep)}`;
            let js = `fetch("${url}", {\n  method: "${ep.method}",\n`;
            if (ep.method !== 'GET') {
                js += `  headers: {\n    "Content-Type": "${ep.contentType}"\n  },\n`;
                if (ep.args && ep.args.some(a => a.source === 'Body')) {
                    js += `  body: JSON.stringify({ ... })\n`;
                }
            }
            js += `}).then(res => res.json());`;
            return js;
        }

        function renderRow(arg, depth = 0, hideSource = false) {
            const padding = depth * 16;
            const isRequired = arg.validators && arg.validators.some(v => v.name === 'Required');
            const displayValidators = arg.validators ? arg.validators.filter(v => v.name !== 'Required') : [];
            const displayType = (arg.type.endsWith('!') || !isRequired) ? arg.type : `${arg.type}!`;

            let row = `
                <tr class="${depth > 0 ? 'bg-white/[0.01]' : ''} group/row transition-colors hover:bg-white/[0.02]">
                    ${hideSource ? '' : `<td class="p-4 font-mono text-[9px] font-black uppercase text-slate-600">${arg.source || 'Body'}</td>`}
                    <td class="p-4 font-bold text-slate-300">
                        <div style="padding-left: ${padding}px" class="flex items-center gap-2">
                            ${depth > 0 ? '<svg class="w-3 h-3 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>' : ''}
                            <span class="text-slate-200">${arg.name}</span>
                        </div>
                    </td>
                    <td class="p-4 font-mono text-xs text-secondary/80">${displayType}</td>
                    ${hideSource ? '' : `<td class="p-4 whitespace-nowrap">${renderValidators(displayValidators)}</td>`}
                    <td class="p-4 text-xs text-slate-500 leading-relaxed max-w-xs">${arg.doc || '-'}</td>
                </tr>
            `;

            const cleanType = arg.type.replace(/[*\[\]]/g, '');
            const model = apiData.models.find(m => m.name === cleanType);
            if (model && (depth < 4)) { 
                model.fields.forEach(f => {
                    row += renderRow({
                        name: f.name,
                        type: f.type,
                        source: arg.source || 'Body',
                        validators: f.validators,
                        doc: f.doc
                    }, depth + 1, hideSource);
                });
            }
            return row;
        }

        function renderValidators(validators) {
            if (!validators || validators.length === 0) return '<span class="text-slate-800">-</span>';
            return validators.map(v => {
                const argsTxt = (v.args && v.args.length > 0) 
                    ? `<span class="text-[10px] text-indigo-300/60 font-mono font-medium ml-1">(${v.args.map(a => a.value).join(', ')})</span>` 
                    : '';
                return `
                    <div class="inline-flex items-center px-2 py-0.5 rounded-md bg-indigo-500/10 border border-indigo-500/20 hover:bg-indigo-500/20 transition-all cursor-help group/badge mb-1 last:mb-0 mr-1" title="${v.doc || 'Validation rule'}">
                        <span class="text-[9px] font-black uppercase text-indigo-400 shadow-sm">${v.name}</span>
                        ${argsTxt}
                    </div>
                `;
            }).join('');
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.createElement('div');
                toast.className = 'fixed bottom-8 right-8 bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-2xl animate-in z-50 font-bold flex items-center gap-3';
                toast.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg> Copied to clipboard!`;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
