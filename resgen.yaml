generator:
  # 生成代码的包名，默认为 resolver
  package: "resolver"
  # 是否开启全自动 API 文档生成功能（生成 docs 目录并自动注册路由）
  enable_api_docs: true
  # 交互式 API 文档 (api.json/api.html) 中的测试请求根地址
  # 用作交互式调试面板中 "Try it out" 接口联调派发时的默认主机前缀
  base_url: "http://localhost:8080"
  
  # 默认的请求体类型，可以使用下方的别名
  default_content_type: "json"
  
  # Content-Type 别名映射：将简短的别名映射为标准的 MIME 类型
  content_type_aliases:
    json: "application/json"
    form: "application/x-www-form-urlencoded"
    multipart: "multipart/form-data"
    xml: "application/xml"
    text: "text/plain"
    
  # 结构体标签生成策略
  # name: 标签名称 (json, form, xml, gorm 等)
  # case: 命名风格转换策略
  #   - snake: 下划线 (UserName -> user_name)
  #   - camel: 小驼峰 (UserName -> userName)
  #   - lower: 全小写 (UserName -> username)
  #   - keep:  保持原样 (UserName -> UserName)
  struct_tags:
    - name: "json"
      case: "snake"
  
  # api.json 文件中的命名风格
  # 可选: snake, camel, lower, keep
  doc_case: "snake"
  
  # 默认错误返回统一响应包装器
  default_wrap: "ResData"

  # 默认成功返回 http 状态码
  default_ok_status: 200

  # 自定义标量生成风格配置
  # 可选风格:
  #   - isolation: 方案 A (默认)。生成中间 DTO 与转换函数，物理层使用原生态 Target 类型 (如 time.Time)
  #   - direct:    方案 B。物理对象中直接使用标量别名 (如 IntTime)，不生成冗余的 DTO，靠标量 JSON Marshaler 自动转换
  scalar_style: "direct"

# 标量类型自定义映射配置 (Scalars Custom Mapping)
# 用于将 DSL 中定义的自定义标量 (scalar) 映射到 Go 物理包的实现类型。
#
# 🚀 极其震撼的【AST 自适应推导与契约强校验系统】说明:
#   1. 开发人员【完全不需要】手动配置繁琐的 `target` 参数了！
#   2. 生成器在运行 `resgen generate` 时，会通过 golang.org/x/tools 自动静态解析 Go 源码中 `model` 的定义。
#   3. 自动智能提取底层 Underlying 物理类型（例如从 `type IntTime time.Time` 自动推导出 "time.Time"），并在生成的代码里全自动写上 package 的 `import` 语句！
#   4. 【三关契约强校验】：自动在生成期强校验该标量是否完美实现了以下三关契约签名：
#      - FromParam(ctx any, s string) error
#      - FromValue(ctx any, v BaseType) error  (BaseType 必须与 DSL 定义相符)
#      - ToValue(ctx any) (BaseType, error)  (BaseType 必须与 DSL 定义相符)
#      如果签名未实现或类型不一致，直接在生成控制台抛出精美的中文语义报错！
#
# 参数配置项说明:
#   - model:  开发人员在 Go 物理项目中手写实现的标量类型的完整包路径 (例如: "github.com/xslasd/resgen/examples/scalars.IntTime")。
scalars:
  IntTime:
    model: "github.com/xslasd/resgen/examples/scalars.IntTime"
